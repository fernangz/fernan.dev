<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>fernan.dev • Base64 Encoder/Decoder</title>
		<meta name="description" content="Encode and decode Base64 strings">
		<link rel="canonical" href="https://fernan.dev/tools/base64" />
		<meta name="author" content="Fernán García de Zúñiga" />
		<link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
		<link rel="shortcut icon" href="/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="fernan.dev" />
		<link rel="manifest" href="/favicon/site.webmanifest" />
		<meta id="androidTheme" name="theme-color" content="hsl(0, 0%, 8%)">
		<meta id="appleTheme" name="apple-mobile-web-app-status-bar-style" content="hsl(0, 0%, 8%)">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="preload" href="/fonts/outfit.ttf" as="font" type="font/ttf" crossorigin="anonymous">
		<link rel="preload" href="/fonts/emoji.ttf" as="font" type="font/ttf" crossorigin="anonymous">
		<link rel="stylesheet" href="/styles/main.css">
		<link rel="stylesheet" href="/styles/tools.css">
		<link rel="stylesheet" href="/styles/base64.css">
	</head>
	<body>
		<a href="#main-content" class="skip-link">Skip to main content</a>
		<nav>
			<a href="/" class="logo" svg="logo" aria-label="Homepage"></a>
			<hr>
			<button class="toggle" aria-label="Menu" svg="plus"></button>
			<ul>
				<li><a href="/">About</a></li>
				<li><a href="/tools/">Tools</a></li>
				<li><a href="/articles/">Articles</a></li>
				<li><a href="/resources/">Resources</a></li>
			</ul>
		</nav>
		<main id="main-content">
			<section>
				<article>
					<a href="/tools/" class="back-link">← Back to Tools</a>
					<h1>Base64 Encoder/Decoder</h1>
					<p>Encode text to Base64 or decode Base64 strings.</p>
					
					<div class="base64-tool">
						<div class="toolbar">
							<button class="tool-btn" id="encode-btn">🔐 Encode</button>
							<button class="tool-btn" id="decode-btn">🔓 Decode</button>
							<button class="tool-btn" id="copy-btn">📋 Copy</button>
							<button class="tool-btn" id="clear-btn">🗑️ Clear</button>
							<button class="tool-btn" id="swap-btn">🔄 Swap</button>
						</div>
						
						<div class="editors">
							<div class="editor">
								<label for="input">Input</label>
								<textarea id="input" placeholder="Enter text to encode/decode..."></textarea>
							</div>
							<div class="editor">
								<label for="output">Output</label>
								<textarea id="output" readonly placeholder="Result will appear here..."></textarea>
							</div>
						</div>
						
						<div id="status-message" class="status-message hidden"></div>
					</div>
				</article>
			</section>
		</main>
		<script src="/scripts/main.js"></script>
		<script src="/scripts/base64.js"></script>
	</body>
</html>
