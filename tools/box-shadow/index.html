<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>fernan.dev • Box Shadow Generator</title>
		<meta name="description" content="Generate CSS box-shadow values">
		<link rel="canonical" href="https://fernan.dev/tools/box-shadow" />
		<meta name="author" content="Fernán García de Zúñiga" />
		<link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
		<link rel="shortcut icon" href="/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="fernan.dev" />
		<link rel="manifest" href="/favicon/site.webmanifest" />
		<meta id="androidTheme" name="theme-color" content="hsl(0, 0%, 8%)">
		<meta id="appleTheme" name="apple-mobile-web-app-status-bar-style" content="hsl(0, 0%, 8%)">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="preload" href="/fonts/outfit.ttf" as="font" type="font/ttf" crossorigin="anonymous">
		<link rel="preload" href="/fonts/emoji.ttf" as="font" type="font/ttf" crossorigin="anonymous">
		<link rel="stylesheet" href="/styles/main.css">
		<link rel="stylesheet" href="/styles/tools.css">
		<link rel="stylesheet" href="/styles/shadow-generator.css">
	</head>
	<body>
		<a href="#main-content" class="skip-link">Skip to main content</a>
		<nav>
			<a href="/" class="logo" svg="logo" aria-label="Homepage"></a>
			<hr>
			<button class="toggle" aria-label="Menu" svg="plus"></button>
			<ul>
				<li><a href="/">About</a></li>
				<li><a href="/tools/">Tools</a></li>
				<li><a href="/articles/">Articles</a></li>
				<li><a href="/resources/">Resources</a></li>
			</ul>
		</nav>
		<main id="main-content">
			<section>
				<article>
					<a href="/tools/" class="back-link">← Back to Tools</a>
					<h1>Box Shadow Generator</h1>
					<p>Generate CSS box-shadow values with live preview.</p>
					
					<div class="shadow-generator">
						<div class="preview-area">
							<div class="preview-box" id="preview-box"></div>
						</div>
						
						<div class="controls">
							<div class="control-group">
								<label for="offset-x">Offset X</label>
								<input type="range" id="offset-x" min="-50" max="50" value="0">
								<span class="control-value" id="offset-x-value">0px</span>
							</div>
							<div class="control-group">
								<label for="offset-y">Offset Y</label>
								<input type="range" id="offset-y" min="-50" max="50" value="0">
								<span class="control-value" id="offset-y-value">0px</span>
							</div>
							<div class="control-group">
								<label for="blur">Blur Radius</label>
								<input type="range" id="blur" min="0" max="100" value="0">
								<span class="control-value" id="blur-value">0px</span>
							</div>
							<div class="control-group">
								<label for="spread">Spread</label>
								<input type="range" id="spread" min="-50" max="50" value="0">
								<span class="control-value" id="spread-value">0px</span>
							</div>
							<div class="control-group">
								<label for="shadow-color">Shadow Color</label>
								<input type="color" id="shadow-color" value="#000000">
							</div>
							<div class="control-group">
								<label for="opacity">Opacity</label>
								<input type="range" id="opacity" min="0" max="100" value="30">
								<span class="control-value" id="opacity-value">30%</span>
							</div>
							<div class="control-group checkbox-group">
								<label>
									<input type="checkbox" id="inset"> Inset Shadow
								</label>
							</div>
						</div>
						
						<div class="code-output">
							<label>CSS Output</label>
							<div class="code-box">
								<code id="css-output">box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.3);</code>
								<button class="copy-btn" id="copy-btn">📋 Copy</button>
							</div>
						</div>
					</div>
				</article>
			</section>
		</main>
		<script src="/scripts/main.js"></script>
		<script src="/scripts/box-shadow.js"></script>
	</body>
</html>
