<!-- COMMON HTML START-->
{% include startHtml.html %}
<!-- PAGE SPECIFIC METAS GO HERE -->
<title>fernan.dev • JSON Formatter</title>
<meta name="description" content="Format, validate and beautify JSON">
<link rel="canonical" href="https://fernan.dev/tools/json-formatter" />
<!-- PAGE SPECIFIC CSS GO HERE -->
<link rel="stylesheet" href="/styles/tools.css">
<link rel="stylesheet" href="/styles/json-formatter.css">
<!-- COMMON BODY START-->
{% include startBody.html %}
<!-- PAGE CONTENT -->
	<a href="/tools/" class="back-link">← Back to Tools</a>
	<h1>JSON Formatter</h1>
	<p>Format, validate, and minify JSON data.</p>

	<div class="json-tool">
		<div class="toolbar" role="toolbar" aria-label="JSON formatting tools">
			<button class="tool-btn" id="format-btn" aria-label="Format JSON">✨ Format</button>
			<button class="tool-btn" id="minify-btn" aria-label="Minify JSON">🗜️ Minify</button>
			<button class="tool-btn" id="copy-btn" aria-label="Copy JSON to clipboard">📋 Copy</button>
			<button class="tool-btn" id="clear-btn" aria-label="Clear JSON editor">🗑️ Clear</button>
		</div>

		<div class="editor-container">
			<label for="json-input" class="visually-hidden">JSON Input</label>
			<textarea id="json-input" placeholder="Paste your JSON here..." aria-label="JSON input editor" aria-describedby="json-status"></textarea>
			<pre id="json-output" class="hidden" role="region" aria-label="Formatted JSON output"></pre>
		</div>

		<div id="status-message" class="status-message hidden" aria-live="polite" aria-atomic="true"></div>
	</div>
<!-- PAGE SCRIPTS GO HERE-->
<script src="/scripts/json-formatter.js"></script>
