<!-- COMMON HTML START-->
{% include startHtml.html %}
<!-- PAGE SPECIFIC METAS GO HERE -->
<title>fernan.dev • Symbols & Emojis</title>
<meta name="description" content="Browse and copy special symbols and emojis" />
<link rel="canonical" href="https://fernan.dev/tools/symbols-emojis" />
<!-- PAGE SPECIFIC CSS GO HERE -->
<link rel="stylesheet" href="/styles/tools.css">
<link rel="stylesheet" href="/styles/symbols-emojis.css">

<!-- Tool Structured Data -->
<script type="application/ld+json">
{
	"@context": "https://schema.org",
	"@type": "WebApplication",
	"name": "Symbols & Emojis",
	"url": "https://fernan.dev/tools/symbols-emojis/",
	"description": "Browse and copy special symbols and emojis. Collection of arrows, currency, math symbols, and emoji characters.",
	"applicationCategory": "DeveloperApplication",
	"operatingSystem": "Web Browser",
	"offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"},
	"featureList": "Symbol browser, Emoji browser, Special characters, Arrow symbols, Currency symbols, Math symbols, Copy to clipboard",
	"inLanguage": "en-US",
	"breadcrumb": {
		"@type": "BreadcrumbList",
		"itemListElement": [
			{"@type": "ListItem", "position": 1, "name": "Home", "item": "https://fernan.dev/"},
			{"@type": "ListItem", "position": 2, "name": "Tools", "item": "https://fernan.dev/tools/"},
			{"@type": "ListItem", "position": 3, "name": "Symbols & Emojis", "item": "https://fernan.dev/tools/symbols-emojis/"}
		]
	}
}
</script>
<!-- COMMON BODY START-->
{% include startBody.html %}
<!-- PAGE CONTENT -->
	<a href="/tools/" class="back-link">← Back to Tools</a>
	<h1>Symbols & Emojis</h1>
	<p>Browse and copy special symbols and emojis. Click on any item to copy it.</p>

	<!-- Search -->
	<div class="search-container">
		<input type="text" id="symbol-search" placeholder="Search symbols...">
		<div id="search-count">Loading...</div>
	</div>

	<!-- Category Tabs -->
	<div id="category-tabs" class="category-tabs">
		<button class="tab-btn active" data-category="all">All</button>
		<button class="tab-btn" data-category="emoji">Emojis</button>
		<button class="tab-btn" data-category="currency">Currency</button>
		<button class="tab-btn" data-category="math">Math</button>
		<button class="tab-btn" data-category="arrows">Arrows</button>
		<button class="tab-btn" data-category="punctuation">Punctuation</button>
		<button class="tab-btn" data-category="technical">Technical</button>
	</div>

	<!-- Loading State -->
	<div id="loading-state" class="loading-state visible">
		<div class="spinner"></div>
		<p>Loading symbols...</p>
	</div>

	<!-- Symbols Grid -->
	<div id="symbols-container" class="symbols-grid"></div>
<!-- PAGE SCRIPTS GO HERE-->
<script src="/scripts/data-loader.js"></script>
<script src="/scripts/symbols-emojis.js"></script>
<!-- COMMON BODY HTML END-->
{% include endBodyHtml.html %}
