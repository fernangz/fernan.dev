<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>fernan.dev • Symbols & Emojis</title>
		<meta name="description" content="Browse and copy special symbols and emojis" />
		<link rel="canonical" href="https://fernan.dev/tools/symbols-emojis" />
		<meta name="author" content="Fernán García de Zúñiga" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
		<link rel="shortcut icon" href="/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="fernan.dev" />
		<link rel="manifest" href="/favicon/site.webmanifest" />
		<meta id="androidTheme" name="theme-color" content="hsl(0, 0%, 8%)">
		<meta id="appleTheme" name="apple-mobile-web-app-status-bar-style" content="hsl(0, 0%, 8%)">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="preload" href="/fonts/outfit.ttf" as="font" type="font/ttf" crossorigin="anonymous">
		<link rel="preload" href="/fonts/emoji.ttf" as="font" type="font/ttf" crossorigin="anonymous">
		<link rel="stylesheet" href="/styles/main.css">
		<link rel="stylesheet" href="/styles/tools.css">
		<link rel="stylesheet" href="/styles/symbols-emojis.css">
	</head>
	<body>
		<a href="#main-content" class="skip-link">Skip to main content</a>
		<nav>
			<a href="/" class="logo" svg="logo" aria-label="fernan.dev"></a>
			<button class="toggle" aria-label="Menu" svg="plus"></button>
			<ul>
				<li><a href="/">About</a></li>
				<li><a href="/tools/">Tools</a></li>
				<li><a href="/articles/">Articles</a></li>
				<li><a href="/resources/">Resources</a></li>
			</ul>
		</nav>
		<main id="main-content">
			<section>
				<article>
					<a href="/tools/" class="back-link">← Back to Tools</a>
					<h1>Symbols & Emojis</h1>
					<p>Browse and copy special symbols and emojis for your projects. Click on any item to copy it.</p>
					
					<!-- Search Bar -->
					<div class="search-container">
						<input type="text" id="symbol-search" class="search-input" placeholder="Search symbols and emojis...">
						<div class="search-info" id="search-count"></div>
					</div>
					
					<!-- Category Tabs -->
					<div class="category-tabs" id="category-tabs">
						<button class="tab-btn active" data-category="all">All</button>
						<button class="tab-btn" data-category="emoji">😊 Emojis</button>
						<button class="tab-btn" data-category="currency">💰 Currency</button>
						<button class="tab-btn" data-category="math">📐 Math</button>
						<button class="tab-btn" data-category="arrows">➡️ Arrows</button>
						<button class="tab-btn" data-category="punctuation">📝 Punctuation</button>
						<button class="tab-btn" data-category="technical">⚙️ Technical</button>
					</div>
					
					<!-- Symbols Grid -->
					<div id="symbols-container" class="symbols-grid">
						<!-- Items loaded dynamically -->
					</div>
					
					<!-- Loading State -->
					<div id="loading-state" class="loading-state">
						<span class="loading-spinner"></span>
						<span>Loading symbols...</span>
					</div>
				</article>
			</section>
		</main>
		<script src="/scripts/main.js"></script>
		<script src="/scripts/data-loader.js"></script>
		<script src="/scripts/symbols-emojis.js"></script>
	</body>
</html>
